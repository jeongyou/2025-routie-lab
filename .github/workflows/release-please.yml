name: release-please (frontend only)

on:
  push:
    branches: [ main ]      # 릴리스 PR을 만들 브랜치
    paths:
      - 'frontend/**'          # 프론트 변경 있을 때만 실행
      - '.github/workflows/**'
  workflow_dispatch: {}        # 수동 실행 허용

jobs:
  release:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json
