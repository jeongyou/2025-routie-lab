name: Sync frontend version with release

on:
  release:
    types: [published]   # 새 release 올라왔을 때만 실행됨

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v3
        with:
          ref: main          # 무조건 main 브랜치로
          fetch-depth: 0     # 전체 기록 + 태그 필요

      - name: Set version from tag
        run: echo "TAG_VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
        # GITHUB_REF_NAME = release 태그 이름 (예: v1.2.3)

      - name: Update frontend/package.json version
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('frontend/package.json', 'utf8'));
          pkg.version = process.env.TAG_VERSION.replace(/^v/, '');
          fs.writeFileSync('frontend/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      
      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json
          git commit -m "chore: sync frontend package.json to ${TAG_VERSION}" || echo "No changes to commit"
          git push origin main
