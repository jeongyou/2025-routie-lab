name: Sync package.json version

on:
  release:
    types: [published]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: get-version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

  sync-main:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update frontend/package.json version
        run: |
          jq ".version = \"${{ needs.prepare.outputs.version }}\"" frontend/package.json > tmp.json
          mv tmp.json frontend/package.json
      - name: Create PR to main
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sync-version/main-${{ needs.prepare.outputs.version }}
          base: main
          title: "chore: sync frontend package.json to ${{ needs.prepare.outputs.version }} (main)"
          body: "자동 생성된 package.json 버전 동기화 PR (main)"
          commit-message: "chore: sync frontend package.json to ${{ needs.prepare.outputs.version }}"
          delete-branch: true

  sync-develop:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update frontend/package.json version
        run: |
          jq ".version = \"${{ needs.prepare.outputs.version }}\"" frontend/package.json > tmp.json
          mv tmp.json frontend/package.json
      - name: Create PR to develop
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sync-version/develop-${{ needs.prepare.outputs.version }}
          base: develop
          title: "chore: sync frontend package.json to ${{ needs.prepare.outputs.version }} (develop)"
          body: "자동 생성된 package.json 버전 동기화 PR (develop)"
          commit-message: "chore: sync frontend package.json to ${{ needs.prepare.outputs.version }}"
          delete-branch: true
