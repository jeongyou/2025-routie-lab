name: Sync frontend version with release tag

on:
  release:
    types: [published]

jobs:
  update-frontend-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag version
        run: |
          echo "TAG_VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "Detected tag: $GITHUB_REF_NAME"

      - name: Update frontend/package.json version
        run: |
          VERSION=${TAG_VERSION#v} # v1.2.3 -> 1.2.3
          node -e "
          const fs=require('fs');
          const pkgPath='./frontend/package.json';
          const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf-8'));
          pkg.version='${VERSION}';
          fs.writeFileSync(pkgPath, JSON.stringify(pkg,null,2)+'\\n');
          "
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json
          git commit -m "chore: sync frontend package.json to ${TAG_VERSION}" || echo "No changes to commit"
          git push
